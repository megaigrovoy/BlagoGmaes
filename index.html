<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f13" />
    <!-- iOS Safari не поддерживает Fullscreen API на iPhone — для фуллскрина пользователю нужно «Добавить на экран Домой».
         Эти meta переводят PWA в standalone/fullscreen, когда игра запускается с домашнего экрана. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NeonNinja" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/neoncat-icon.webp" />
    <title>NeonNinjaCat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Модели MediaPipe (.task) грузятся с этого origin во время init — TLS/HTTP заранее -->
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://storage.googleapis.com" />
    <!-- Базовый WASM / glue MediaPipe тянем со своего origin: запускаем загрузку параллельно main.js.
         Без crossorigin, чтобы preload совпал с тем, как MediaPipe сам фетчит эти файлы. -->
    <link rel="preload" href="/mediapipe-wasm/vision_wasm_internal.js" as="script" />
    <link rel="preload" href="/mediapipe-wasm/vision_wasm_internal.wasm" as="fetch" type="application/wasm" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="game-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="game-canvas"></canvas>
      <div id="ui-layer">
        <div id="hud-game" class="hud-game is-hidden">
          <h1 id="score-display"></h1>
          <div class="hud-row">
            <span id="level-display"></span>
            <span id="combo-display" class="combo-display is-hidden"></span>
          </div>
          <div id="word-progress" class="word-progress is-hidden"></div>
          <button type="button" id="btn-back-menu" class="btn-menu btn-back-menu"></button>
        </div>
        <div id="main-menu" class="menu-overlay is-hidden">
          <div class="menu-fs-stack">
            <button type="button" id="btn-fullscreen" class="btn-fullscreen" aria-label="" hidden>
              <span class="btn-fullscreen-on" aria-hidden="true">⛶</span>
              <span class="btn-fullscreen-off" aria-hidden="true">⛶</span>
              <span class="btn-fullscreen-label"></span>
            </button>
            <div id="menu-quick-settings" class="menu-quick-settings" role="group" aria-label="">
              <div class="menu-player-row menu-lang-row" role="radiogroup" aria-labelledby="menu-lang-label">
                <div id="menu-lang-label" class="menu-player-label"></div>
                <div class="menu-player-segment">
                  <label class="menu-player-pill">
                    <input type="radio" name="ninja-lang" id="opt-lang-ru" value="ru" checked />
                    <span>Русский</span>
                  </label>
                  <label class="menu-player-pill">
                    <input type="radio" name="ninja-lang" id="opt-lang-en" value="en" />
                    <span>English</span>
                  </label>
                </div>
              </div>
              <div class="menu-quick-audio">
                <label class="menu-option-toggle menu-option-toggle--compact">
                  <input type="checkbox" id="opt-sound-off" class="menu-option-input" aria-label="" />
                  <span class="menu-option-left">
                    <span class="menu-option-emoji" aria-hidden="true">
                      <span class="menu-option-emoji-on">🔊</span>
                      <span class="menu-option-emoji-off">🔇</span>
                    </span>
                    <span class="menu-option-text">
                      <span id="menu-opt-sound-title" class="menu-option-title"></span>
                    </span>
                  </span>
                  <span class="menu-option-switch" aria-hidden="true"><span class="menu-option-knob"></span></span>
                </label>
                <label class="menu-option-toggle menu-option-toggle--compact">
                  <input type="checkbox" id="opt-music-off" class="menu-option-input" aria-label="" />
                  <span class="menu-option-left">
                    <span class="menu-option-emoji" aria-hidden="true">
                      <span class="menu-option-emoji-on">🎵</span>
                      <span class="menu-option-emoji-off">🔇</span>
                    </span>
                    <span class="menu-option-text">
                      <span id="menu-opt-music-title" class="menu-option-title"></span>
                      <span id="menu-opt-music-desc" class="menu-option-desc"></span>
                    </span>
                  </span>
                  <span class="menu-option-switch" aria-hidden="true"><span class="menu-option-knob"></span></span>
                </label>
              </div>
              <div class="menu-player-row" role="radiogroup" aria-labelledby="menu-player-label">
                <div id="menu-player-label" class="menu-player-label"></div>
                <div class="menu-player-segment">
                  <label class="menu-player-pill menu-player-pill--icon" id="wrap-opt-players-1">
                    <input type="radio" name="ninja-players" id="opt-players-1" value="1" />
                    <span class="menu-player-pill-icon" aria-hidden="true">
                      <svg class="menu-player-svg menu-player-svg--one" viewBox="0 0 44 52" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="22" cy="9" r="5.5" fill="currentColor" />
                        <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round">
                          <path d="M22 15.5v13" />
                          <path d="M22 17.5L9 4.5" />
                          <path d="M22 17.5L35 4.5" />
                          <path d="M22 28.5L15.5 46.5" />
                          <path d="M22 28.5L28.5 46.5" />
                        </g>
                      </svg>
                    </span>
                  </label>
                  <label class="menu-player-pill menu-player-pill--icon" id="wrap-opt-players-2">
                    <input type="radio" name="ninja-players" id="opt-players-2" value="2" checked />
                    <span class="menu-player-pill-icon" aria-hidden="true">
                      <svg class="menu-player-svg menu-player-svg--two" viewBox="0 0 96 52" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="23" cy="9" r="5" fill="currentColor" />
                        <g fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round">
                          <path d="M23 15v11" />
                          <path d="M23 17L11 5" />
                          <path d="M23 17L35 5" />
                          <path d="M23 26L17 44" />
                          <path d="M23 26L29 44" />
                        </g>
                        <circle cx="71" cy="9" r="5" fill="currentColor" />
                        <g fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round">
                          <path d="M71 15v11" />
                          <path d="M71 17L59 5" />
                          <path d="M71 17L83 5" />
                          <path d="M71 26L65 44" />
                          <path d="M71 26L77 44" />
                        </g>
                      </svg>
                    </span>
                  </label>
                </div>
              </div>
            </div>
          </div>
          <div class="menu-panel">
            <img src="/src/assets/neoncat.webp" alt="NeonNinjaCat" class="menu-hero-img" width="480" height="480" />
            <h2 id="menu-heading" class="menu-heading"></h2>
            <p id="menu-hint" class="menu-hint"></p>
            <div id="level-grid" class="level-grid"></div>
          </div>
        </div>
        <div id="win-overlay" class="win-overlay is-hidden">
          <div class="win-card">
            <div id="win-stars" class="win-stars" aria-hidden="true"></div>
            <h2 id="win-title" class="win-title"></h2>
            <p id="win-score" class="win-score"></p>
            <div class="win-actions">
              <button type="button" id="btn-win-next" class="btn-menu btn-win-next"></button>
              <button type="button" id="btn-win-menu" class="btn-menu btn-win-menu"></button>
            </div>
          </div>
        </div>
        <div id="loading" class="visible">
          <img src="/src/assets/neoncat.webp" alt="Neon Cat" id="loading-image" />
          <div id="loading-text"></div>
          <div id="progress-container">
            <div id="progress-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
